<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>My Profile - SwapStore</title>
    <style>
      .profile-container {
        max-width: 80rem;
        margin: 5rem auto;
        padding: 4rem;
        background: var(--backgroundSecondary);
        border-radius: 1rem;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .profile-header {
        display: flex;
        align-items: center;
        gap: 3rem;
        margin-bottom: 4rem;
        border-bottom: 1px solid var(--borderColor);
        padding-bottom: 2rem;
      }
      .profile-pic {
        width: 12rem;
        height: 12rem;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid var(--main-color);
      }
      .profile-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3rem;
      }
      .info-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .info-group label {
        font-weight: 700;
        font-size: 1.4rem;
        color: #666;
        text-transform: uppercase;
      }
      .info-group p {
        font-size: 1.8rem;
        color: var(--textColor);
        background: #f9f9f9;
        padding: 1rem;
        border-radius: 0.5rem;
        border: 1px solid var(--borderColor);
      }
      .full-width {
        grid-column: span 2;
      }
    </style>
    <script type="module" crossorigin src="/assets/profile-DPY8ydH6.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/style-C4px4kn2.js">
    <link rel="modulepreload" crossorigin href="/assets/footer-DiC0RFuE.js">
    <link rel="modulepreload" crossorigin href="/assets/navAuth-DDuyWbIA.js">
    <link rel="stylesheet" crossorigin href="/assets/style-UuQ0f8Xn.css">
  </head>
  <body>
    <!-- Navbar -->
    <header class="section-navbar">
        <section class="top_txt">
          <div class="head container">
            <div class="head_txt">
              <p>Free shipping, 30-day return or refund guarantee.</p>
            </div>
            <div class="sing_in_up">
              <!-- Handled by navAuth.js -->
            </div>
          </div>
        </section>
        <div class="container">
          <div class="navbar-brand">
            <a href="index.html">
              <img src="/images/swap-store-high-resolution-logo-transparent.png" alt="logo" class="logo" width="80px" />
            </a>
          </div>
          <nav class="navbar">
            <ul>
              <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
              <li class="nav-item"><a href="about.html" class="nav-link">about</a></li>
              <li class="nav-item"><a href="products.html" class="nav-link">products</a></li>
              <li class="nav-item"><a href="contact.html" class="nav-link">contact</a></li>
              <li class="nav-item">
                <a href="addToCart.html" class="nav-link add-to-cart-button" id="cartValue">
                  <i class="fa-solid fa-cart-shopping"> 0 </i>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </header>

    <main class="container">
      <div class="profile-container">
        <div class="profile-header">
          <img src="/images/favicon-32x32.png" alt="Profile" class="profile-pic" id="userPic" />
          <div>
            <h2 id="userNameHeader" style="font-size: 3rem;">Loading...</h2>
            <p id="userEmailHeader" style="font-size: 1.6rem; color: #666;">Loading...</p>
          </div>
        </div>

        <div class="profile-info">
          <div class="info-group">
            <label>Full Name</label>
            <p id="profileName">--</p>
          </div>
          <div class="info-group">
            <label>Email Address</label>
            <p id="profileEmail">--</p>
          </div>
          <div class="info-group">
            <label>Phone Number</label>
            <p id="profilePhone">--</p>
          </div>
          <div class="info-group">
            <label>Role</label>
            <p id="profileRole">User</p>
          </div>
          
          <div class="full-width">
            <h3 style="font-size: 2rem; margin: 2rem 0 1rem;">Shipping Address</h3>
          </div>

          <div class="info-group full-width">
            <label>Street</label>
            <p id="profileStreet">--</p>
          </div>
          <div class="info-group">
            <label>City</label>
            <p id="profileCity">--</p>
          </div>
          <div class="info-group">
            <label>State</label>
            <p id="profileState">--</p>
          </div>
          <div class="info-group">
            <label>Zip Code</label>
            <p id="profileZip">--</p>
          </div>
          <div class="info-group">
            <label>Country</label>
            <p id="profileCountry">--</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="section-footer">
    </footer>

  </body>
</html>
