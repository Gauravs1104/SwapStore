<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <title>My Profile - SwapStore</title>
    <style>
      body {
        background-color: #f8fafc;
      }
      .profile-section {
        padding: 5rem 2rem;
      }
      .profile-container {
        max-width: 90rem;
        margin: 0 auto;
        background: #fff;
        border-radius: 2rem;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        overflow: hidden;
      }
      .profile-banner {
        height: 15rem;
        background: linear-gradient(135deg, var(--main-color) 0%, #3b42cc 100%);
        position: relative;
      }
      .profile-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: -6rem;
        padding: 0 4rem 3rem;
        border-bottom: 1px solid #edf2f7;
        text-align: center;
      }
      .profile-pic-container {
        width: 13rem;
        height: 13rem;
        border-radius: 50%;
        padding: 0.5rem;
        background: #fff;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        margin-bottom: 2rem;
      }
      .profile-pic {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
      }
      .profile-header h2 {
        font-size: 3rem;
        color: var(--buttonColor);
        font-weight: 800;
        margin-bottom: 0.5rem;
      }
      .profile-header p {
        font-size: 1.6rem;
        color: #718096;
      }
      .profile-body {
        padding: 4rem;
      }
      .info-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 3rem;
      }
      .info-card {
        background: #f8fafc;
        padding: 2rem;
        border-radius: 1.5rem;
        border: 1px solid #edf2f7;
        transition: all 0.3s ease;
      }
      .info-card:hover {
        border-color: var(--main-color);
        background: #fff;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      }
      .info-card label {
        display: block;
        font-weight: 700;
        font-size: 1.3rem;
        color: #a0aec0;
        text-transform: uppercase;
        margin-bottom: 1rem;
        letter-spacing: 0.05em;
      }
      .info-card p {
        font-size: 1.8rem;
        color: var(--buttonColor);
        font-weight: 600;
      }
      .section-title {
        grid-column: span 2;
        font-size: 2.2rem;
        font-weight: 800;
        color: var(--buttonColor);
        margin: 2rem 0 1rem;
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }
      .section-title::after {
        content: '';
        flex: 1;
        height: 2px;
        background: #edf2f7;
      }
      .full-width {
        grid-column: span 2;
      }
      .logout-container {
        margin-top: 4rem;
        text-align: center;
      }
      .logout-btn {
        padding: 1.4rem 4rem;
        background: #fee2e2;
        color: #dc2626;
        border: none;
        border-radius: 1.2rem;
        font-size: 1.6rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .logout-btn:hover {
        background: #ef4444;
        color: white;
      }
      @media (max-width: 600px) {
        .info-grid {
          grid-template-columns: 1fr;
        }
        .section-title, .full-width {
          grid-column: span 1;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navbar (same as other pages) -->
    <header class="section-navbar">
        <section class="top_txt">
          <div class="head container">
            <div class="head_txt">
              <p>Free shipping, 30-day return or refund guarantee.</p>
            </div>
            <div class="sing_in_up">
              <!-- Handled by navAuth.js -->
            </div>
          </div>
        </section>
        <div class="container" style="padding: 1.5rem 2.4rem;">
          <div class="navbar-brand">
            <a href="index.html">
              <img src="/images/swap-store-high-resolution-logo-transparent.png" alt="logo" class="logo" width="100px" />
            </a>
          </div>
          <nav class="navbar">
            <ul>
              <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
              <li class="nav-item"><a href="about.html" class="nav-link">about</a></li>
              <li class="nav-item"><a href="products.html" class="nav-link">products</a></li>
              <li class="nav-item"><a href="contact.html" class="nav-link">contact</a></li>
              <li class="nav-item">
                <a href="addToCart.html" class="nav-link add-to-cart-button" id="cartValue">
                  <i class="fa-solid fa-cart-shopping"> 0 </i>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </header>

    <main class="profile-section">
      <div class="profile-container">
        <div class="profile-banner"></div>
        <div class="profile-header">
          <div class="profile-pic-container">
            <img src="/images/favicon-32x32.png" alt="Profile" class="profile-pic" id="userPic" />
          </div>
          <h2 id="userNameHeader">Loading...</h2>
          <p id="userEmailHeader">Loading...</p>
        </div>

        <div class="profile-body">
          <div class="info-grid">
            <div class="section-title">Personal Information</div>
            
            <div class="info-card">
              <label>Full Name</label>
              <p id="profileName">--</p>
            </div>
            <div class="info-card">
              <label>Email Address</label>
              <p id="profileEmail">--</p>
            </div>
            <div class="info-card">
              <label>Phone Number</label>
              <p id="profilePhone">--</p>
            </div>
            <div class="info-card">
              <label>Account Role</label>
              <p id="profileRole">User</p>
            </div>
            
            <div class="section-title">Shipping Details</div>

            <div class="info-card full-width">
              <label>Street Address</label>
              <p id="profileStreet">--</p>
            </div>
            <div class="info-card">
              <label>City</label>
              <p id="profileCity">--</p>
            </div>
            <div class="info-card">
              <label>State / Province</label>
              <p id="profileState">--</p>
            </div>
            <div class="info-card">
              <label>Zip / Postal Code</label>
              <p id="profileZip">--</p>
            </div>
            <div class="info-card">
              <label>Country</label>
              <p id="profileCountry">--</p>
            </div>
          </div>
          
          <div class="logout-container">
            <button id="profileLogoutBtn" class="logout-btn">
              <i class="fa-solid fa-right-from-bracket"></i> Sign Out
            </button>
          </div>
        </div>
      </div>
    </main>

    <footer class="section-footer">
        <script type="module" src="footer.js"></script>
    </footer>

    <script type="module" src="navAuth.js"></script>
    <script type="module" src="profile.js"></script>
  </body>
</html>
